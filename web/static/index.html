<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
	<link rel="stylesheet" type="text/css" href="/index.css">
	<script src="/js/verity.js"></script>
	<script src="/index.js" type="module"></script>
</head>

<body>
    <h1 style="margin-top: 2px; line-height: 1.05; margin-bottom: 10px">Pudding Golden Test UI</h1>

    <div>
        <button id="file_refresh">Refresh:</button>
        <select id="file_select">
            <option>[New]</option>
        </select>
        <input id="filename" value="" placeholder="filename" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>
        <button id="file_load">Load</button>
        <button id="file_save" class="save">Save</button>
        <button id="file_delete" class="delete">Delete</button>
    </div>

    <div id="input_output">
        <div id="input_side">
            <div id="compose_chars">
                <button>λ</button><button>Π</button><button>Σ</button><button>§</button><button>·</button>
            </div>
            <textarea id="input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>
        </div>
        <div id="output_side">
            <div class="tabs">
                <div class="tab">
                    <button>prelex</button>
                    <div class="formats">
                        <label><input type="checkbox" value="prelex.txt"/> text</label>
                        <label><input type="checkbox" value="prelex.json"/> json</label>
                    </div>
                </div>
                <div class="tab">
                    <button>tokenize</button>
                    <div class="formats">
                        <label><input type="checkbox" value="tokenize.txt"/> text</label>
                        <label><input type="checkbox" value="tokenize.json"/> json</label>
                    </div>
                </div>
                <div class="tab">
                    <button>parse</button>
                    <div class="formats">
                        <label><input type="checkbox" value="parse.txt"/> text</label>
                        <label><input type="checkbox" value="parse.json"/> json</label>
                    </div>
                </div>
                <div class="tab">
                    <button>elab</button>
                    <div class="formats">
                        <label><input type="checkbox" value="elab.txt"/> text</label>
                        <label><input type="checkbox" value="elab.json"/> json</label>
                    </div>
                </div>
            </div>
            <pre id="output"></pre>
        </div>
    </div>
</body>
